{% extends "events_app/base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
    <h2 class="text-2xl font-bold mb-6 text-gray-800">
        {% if form.instance.pk %}Update Event
        {% else %}Create New Event{% endif %}
    </h2>

    <form method="POST" class="space-y-4">
        {% csrf_token %}
        
        {% for field in form %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
            {% endif %}
        </div>
        {% endfor %}

        <div class="pt-4">
            <button type="submit" class="w-full bg-pink-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700">
                Save Event Details
            </button>
        </div>
    </form>
</div>
{% endblock %}
