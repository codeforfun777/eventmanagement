{% extends "events_app/base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10">
    <div class="bg-white shadow-xl rounded-2xl overflow-hidden border border-gray-100">
        

        <form method="POST" class="p-8 space-y-6">
            {% csrf_token %}
            
            <div class="space-y-4">
                {% for field in form %}
                    {% if field.name != 'events' %}
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">{{ field.label }}</label>
                        <input type="{{ field.field.widget.input_type }}" 
                               name="{{ field.name }}" 
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                               placeholder="Enter {{ field.label }}">
                        {% if field.errors %}<p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>{% endif %}
                    </div>
                    {% endif %}
                {% endfor %}
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-3 text-black-700">Choose Events to Attend:</label>
                <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 max-h-48 overflow-y-auto space-y-2">
                    {{ form.events }}
                </div>
            </div>

            <button type="submit" class="w-full bg-red-600 text-white font-bold py-3 rounded-xl">
                Complete Registration
            </button>
        </form>
    </div>
</div>
{% endblock %}
