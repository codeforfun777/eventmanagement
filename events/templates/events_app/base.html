<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    
    <nav class="bg-red-700 p-4 text-white ">
        <div class="container mx-auto flex justify-between items-center">
            <a href="{% url 'dashboard' %}" class="text-2xl font-bold">EventManager</a>
            <ul class="flex space-x-6 font-medium">
                <li><a href="{% url 'dashboard' %}" class="hover:text-blue-200">Dashboard</a></li>
                <li><a href="{% url 'event-list' %}" class="hover:text-blue-200">All Events</a></li>
                <li><a href="{% url 'category-list' %}" class="hover:text-blue-200">Categories</a></li>
            </ul>
        </div>
    </nav>

    <main class="container mx-auto mt-8 px-4">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
